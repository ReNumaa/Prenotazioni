<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data: https:; font-src 'self'; frame-src 'self' https://accounts.google.com; form-action 'self'">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json?v=1">
    <meta name="theme-color" content="#4F46E5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Prenotazioni">
    <title>Accedi</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
    <link rel="stylesheet" href="css/style.css?v=1">
    <link rel="stylesheet" href="css/login.css?v=1">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="/" class="nav-brand-link">📅 <span class="brand-text">Prenotazioni</span></a>
            </div>
            <div class="nav-right">
                <ul class="nav-desktop-links">
                    <li><a href="/">Calendario</a></li>
                </ul>
                <button class="nav-hamburger" id="navHamburger" aria-label="Menu">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <div class="login-page">
        <div class="login-card">
            <div class="login-logo-text">📅</div>

            <div class="login-tabs">
                <button class="login-tab active" id="tabAccedi" onclick="switchTab('accedi')">Accedi</button>
                <button class="login-tab" id="tabRegistrati" onclick="switchTab('registrati')">Registrati</button>
            </div>

            <!-- ACCEDI -->
            <div id="panelAccedi">
                <p class="login-subtitle">Accedi per gestire i tuoi appuntamenti</p>
                <div class="social-buttons">
                    <button class="social-btn social-btn-google" onclick="startSocialLogin('Google')">
                        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        Continua con Google
                    </button>
                </div>
                <div class="login-divider"><span>oppure</span></div>
                <form id="manualLoginForm" class="auth-form">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" placeholder="nome@email.com" autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <div class="password-input-wrap">
                            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
                            <button type="button" class="password-toggle" onclick="togglePwd('loginPassword', this)">Mostra</button>
                        </div>
                    </div>
                    <div id="loginError" class="login-error" style="display:none;"></div>
                    <button type="submit" class="btn-primary" style="width:100%">Accedi</button>
                </form>
                <button class="forgot-password-link" onclick="switchTab('forgot')">Hai dimenticato la password?</button>
            </div>

            <!-- PASSWORD DIMENTICATA -->
            <div id="panelForgot" style="display:none;">
                <p class="login-subtitle">Inserisci la tua email per reimpostare la password.</p>
                <div id="forgotSuccess" style="display:none; text-align:center; padding: 1.5rem 0;">
                    <div style="font-size:2.5rem; margin-bottom:0.75rem;">📧</div>
                    <p style="font-weight:600;">Email inviata!</p>
                    <p style="color:#555; font-size:0.95rem;">Controlla la posta e clicca il link per reimpostare.</p>
                    <button class="forgot-password-link" style="margin-top:1rem;" onclick="switchTab('accedi')">Torna al login</button>
                </div>
                <form id="forgotForm" class="auth-form">
                    <div class="form-group">
                        <label for="forgotEmail">Email</label>
                        <input type="email" id="forgotEmail" placeholder="nome@email.com" autocomplete="email">
                    </div>
                    <div id="forgotError" class="login-error" style="display:none;"></div>
                    <button type="submit" class="btn-primary" style="width:100%">Invia link di reset</button>
                </form>
            </div>

            <!-- REGISTRATI -->
            <div id="panelRegistrati" style="display:none;">
                <p class="login-subtitle">Crea un account per prenotare</p>
                <div class="social-buttons">
                    <button class="social-btn social-btn-google" onclick="startSocialLogin('Google')">
                        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        Registrati con Google
                    </button>
                </div>
                <div class="login-divider"><span>oppure</span></div>
                <form id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label for="regName">Nome e Cognome *</label>
                        <input type="text" id="regName" placeholder="Mario Rossi" autocomplete="name">
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email *</label>
                        <input type="email" id="regEmail" placeholder="nome@email.com" autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="regWhatsapp">Telefono *</label>
                        <input type="tel" id="regWhatsapp" placeholder="+39 333 1234567" autocomplete="tel">
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Password *</label>
                        <div class="password-input-wrap">
                            <input type="password" id="regPassword" placeholder="Minimo 6 caratteri" autocomplete="new-password">
                            <button type="button" class="password-toggle" onclick="togglePwd('regPassword', this)">Mostra</button>
                        </div>
                    </div>
                    <div id="registerError" class="login-error" style="display:none;"></div>
                    <button type="submit" class="btn-primary" style="width:100%">Registrati</button>
                </form>
            </div>

            <!-- CONFERMA EMAIL -->
            <div id="panelConfirm" style="display:none; text-align:center; padding: 2rem 0;">
                <div style="font-size:2.5rem; margin-bottom:0.75rem;">📧</div>
                <h3>Controlla la tua email</h3>
                <p style="color:#555; margin-top:0.5rem;" id="confirmEmailText"></p>
                <button class="forgot-password-link" style="margin-top:1.5rem;" onclick="switchTab('accedi')">Torna al login</button>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="nav-sidebar-overlay" id="navSidebarOverlay" onclick="toggleNavMenu()"></div>
    <nav class="nav-sidebar" id="navSidebar">
        <div class="nav-sidebar-header">
            <span class="nav-sidebar-title">Menu</span>
            <button class="nav-sidebar-close" onclick="toggleNavMenu()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <ul class="nav-sidebar-links">
            <li><a href="/">Calendario</a></li>
        </ul>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.99.1/dist/umd/supabase.min.js" integrity="sha384-nBSomYN4UWX4we7Pw5GsQDkjtwLh2Wde+3szWl5Lzf0zuN9XncHIZLNoucos4C7f" crossorigin="anonymous"></script>
    <script src="js/supabase-client.js?v=1"></script>
    <script src="js/ui.js?v=1"></script>
    <script src="js/data.js?v=1"></script>
    <script src="js/tenant.js?v=1"></script>
    <script src="js/auth.js?v=1"></script>
    <script>
        if (!TENANT_SLUG) { window.location.href = 'index.html'; }
    </script>
    <script>
        function switchTab(tab) {
            document.getElementById('panelAccedi').style.display = tab === 'accedi' ? '' : 'none';
            document.getElementById('panelRegistrati').style.display = tab === 'registrati' ? '' : 'none';
            document.getElementById('panelForgot').style.display = tab === 'forgot' ? '' : 'none';
            document.getElementById('panelConfirm').style.display = tab === 'confirm' ? '' : 'none';
            document.getElementById('tabAccedi').classList.toggle('active', tab === 'accedi' || tab === 'forgot');
            document.getElementById('tabRegistrati').classList.toggle('active', tab === 'registrati');
        }

        function togglePwd(fieldId, btn) {
            const f = document.getElementById(fieldId);
            const show = f.type === 'password';
            f.type = show ? 'text' : 'password';
            btn.textContent = show ? 'Nascondi' : 'Mostra';
        }

        async function startSocialLogin(provider) {
            if (typeof supabaseClient === 'undefined') {
                showToast('Supabase non configurato. Login non disponibile in modalità demo.', 'info');
                return;
            }
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: provider.toLowerCase(),
                options: { redirectTo: window.location.origin + '/login.html' }
            });
            if (error) showToast(error.message, 'error');
        }

        // Login form
        document.getElementById('manualLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errEl = document.getElementById('loginError');
            errEl.style.display = 'none';
            if (!email || !password) { errEl.textContent = 'Compila tutti i campi.'; errEl.style.display = 'block'; return; }
            const btn = e.target.querySelector('button[type="submit"]');
            setLoading(btn, true, 'Accesso...');
            const result = await loginWithPassword(email, password);
            setLoading(btn, false);
            if (!result.ok) { errEl.textContent = result.error; errEl.style.display = 'block'; return; }
            window.location.href = tenantUrl('index.html');
        });

        // Register form
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const whatsapp = normalizePhone(document.getElementById('regWhatsapp').value.trim());
            const password = document.getElementById('regPassword').value;
            const errEl = document.getElementById('registerError');
            errEl.style.display = 'none';
            if (!name || !email || !whatsapp || !password) { errEl.textContent = 'Compila tutti i campi.'; errEl.style.display = 'block'; return; }
            const btn = e.target.querySelector('button[type="submit"]');
            setLoading(btn, true, 'Registrazione...');
            const result = await registerUser(name, email, whatsapp, password);
            setLoading(btn, false);
            if (!result.ok) { errEl.textContent = result.error; errEl.style.display = 'block'; return; }
            document.getElementById('confirmEmailText').textContent = `Abbiamo inviato un link di conferma a ${email}.`;
            switchTab('confirm');
        });

        // Forgot password form
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('forgotEmail').value.trim();
            const errEl = document.getElementById('forgotError');
            errEl.style.display = 'none';
            if (!email) { errEl.textContent = 'Inserisci la tua email.'; errEl.style.display = 'block'; return; }
            const btn = e.target.querySelector('button[type="submit"]');
            setLoading(btn, true, 'Invio...');
            const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/login.html'
            });
            setLoading(btn, false);
            if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; return; }
            document.getElementById('forgotForm').style.display = 'none';
            document.getElementById('forgotSuccess').style.display = 'block';
        });

        // OAuth callback / already logged in redirect
        (async () => {
            await resolveTenant();
            await initAuth();
            rewriteTenantLinks();
            const user = getCurrentUser();
            if (user) window.location.href = tenantUrl('index.html');
        })();
    </script>
</body>
</html>
